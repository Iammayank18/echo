<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quick Actions</title>
  <link rel="stylesheet" href="quick-actions.css">
</head>
<body>
  <div class="quick-actions-menu" id="quick-actions-menu">
    <div class="qa-header">Quick Action</div>
    <button class="qa-item" data-action="summarize">
      <span class="qa-icon">S</span>
      <span class="qa-label">Summarize</span>
    </button>
    <button class="qa-item" data-action="bullets">
      <span class="qa-icon">&bull;</span>
      <span class="qa-label">Bullet Points</span>
    </button>
    <button class="qa-item" data-action="translate">
      <span class="qa-icon">T</span>
      <span class="qa-label">Translate</span>
    </button>
    <button class="qa-item" data-action="reply">
      <span class="qa-icon">R</span>
      <span class="qa-label">Reply</span>
    </button>
    <button class="qa-item" data-action="just-transcribe">
      <span class="qa-icon">J</span>
      <span class="qa-label">Just Transcribe</span>
    </button>
  </div>
  <script src="quick-actions.js"></script>
</body>
</html>
